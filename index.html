let AC;
function initAudio(){ if(AC)return; AC=new(window.AudioContext||window.webkitAudioContext)(); }
function playType(){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain(); o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(880+Math.random()*160,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(660,AC.currentTime+0.06);
  g.gain.setValueAtTime(0.07,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.07);
  o.start(); o.stop(AC.currentTime+0.07);
}
function playMiss(){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain(); o.type='sawtooth'; o.connect(g); g.connect(AC.destination);
  o.frequency.value=150; g.gain.setValueAtTime(0.06,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.start(); o.stop(AC.currentTime+0.1);
}
function playDestroy(){
  if(!AC)return;
  const dur=0.35, buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain(); g.gain.setValueAtTime(0.22,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.connect(g); g.connect(AC.destination); src.start();
  const o=AC.createOscillator(),g2=AC.createGain(); o.connect(g2); g2.connect(AC.destination);
  o.frequency.setValueAtTime(350,AC.currentTime); o.frequency.exponentialRampToValueAtTime(50,AC.currentTime+dur);
  g2.gain.setValueAtTime(0.18,AC.currentTime); g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}
function playDamage(){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain(); o.type='sawtooth'; o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(190,AC.currentTime); o.frequency.exponentialRampToValueAtTime(55,AC.currentTime+0.45);
  g.gain.setValueAtTime(0.25,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.45);
  o.start(); o.stop(AC.currentTime+0.45);
}
function playHeal(){
  if(!AC)return;
  [523,659,784].forEach((f,i)=>{ const o=AC.createOscillator(),g=AC.createGain(); o.connect(g); g.connect(AC.destination); o.frequency.value=f; const t=AC.currentTime+i*0.1; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.12,t+0.05); g.gain.exponentialRampToValueAtTime(0.001,t+0.28); o.start(t); o.stop(t+0.28); });
}
function playStock(){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.connect(g);g.connect(AC.destination);
  o.frequency.setValueAtTime(660,AC.currentTime);o.frequency.exponentialRampToValueAtTime(880,AC.currentTime+0.09);
  g.gain.setValueAtTime(0.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.11);
  o.start();o.stop(AC.currentTime+0.11);
}
function playGameOver(){
  if(!AC)return;
  [220,175,140,110].forEach((f,i)=>{ const o=AC.createOscillator(),g=AC.createGain(); o.type='sawtooth'; o.connect(g); g.connect(AC.destination); o.frequency.value=f; const t=AC.currentTime+i*0.3; g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.29); o.start(t); o.stop(t+0.29); });
}

// ── ヘルパー ──────────────────────────────────────────────────────────────────
function rnd(a,b){return Math.random()*(b-a)+a;}
function rndFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function roundRect(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── LocalStorage ──────────────────────────────────────────────────────────────
function getLeaderboard(){ try{return JSON.parse(localStorage.getItem('meteorTypingScores'))||[];}catch{return[];} }
function saveScore(){
  const board=getLeaderboard();
  const rank=getRank(G.score);
  const entry={name:G.nameInput.trim()||'名無し',score:G.score,level:G.level,diff:G.diff,rankName:rank.name,rankColor:rank.color,destroyed:G.destroyed,date:new Date().toLocaleDateString('ja-JP')};
  board.push(entry); board.sort((a,b)=>b.score-a.score); board.splice(10);
  localStorage.setItem('meteorTypingScores',JSON.stringify(board));
  G.myRankPos=board.findIndex(e=>e.score===entry.score&&e.name===entry.name)+1;
}

// ── ローマ字バリアント ─────────────────────────────────────────────────────────
const SUBS=[['sha',['sya']],['shi',['si']],['shu',['syu']],['sho',['syo']],['chi',['ti']],['cha',['tya','cya']],['chu',['tyu','cyu']],['cho',['tyo','cyo']],['tsu',['tu']],['fu',['hu']],['ji',['zi']],['ja',['jya','zya']],['ju',['jyu','zyu']],['jo',['jyo','zyo']]];
function expandVariants(r){
  const res=new Set([r]); let chg=true;
  while(chg){ chg=false; for(const v of[...res]){ for(const[from,tos]of SUBS){ const idx=v.indexOf(from); if(idx>=0){for(const to of tos){const nv=v.slice(0,idx)+to+v.slice(idx+from.length); if(!res.has(nv)){res.add(nv);chg=true;}}}}} }
  return[...res];
}

// ── 単語選択（重複抑制） ──────────────────────────────────────────────────────
function pickWord(isHeal){
  if(isHeal){ const c=WORD_DB.tier1.filter(w=>!G.recentWords.has(w.j)); const w=rndFrom(c.length?c:WORD_DB.tier1); track(w); return w; }
  const cfg=DIFF_CFG[G.diff]; const idx=Math.min(G.level-1,cfg.tierSeq.length-1); const tier=cfg.tierSeq[idx]; const roll=Math.random();
  let pool;
  if(tier===1)      pool=roll<0.15?WORD_DB.tier2:WORD_DB.tier1;
  else if(tier===2) pool=roll<0.2?WORD_DB.tier1:roll<0.75?WORD_DB.tier2:WORD_DB.tier3;
  else if(tier===3) pool=roll<0.2?WORD_DB.tier2:WORD_DB.tier3;
  else              pool=roll<0.2?WORD_DB.tier3:WORD_DB.tier4;
  const c=pool.filter(w=>!G.recentWords.has(w.j)); const w=rndFrom(c.length?c:pool); track(w); return w;
}
function track(w){ G.recentWords.add(w.j); if(G.recentWords.size>18)G.recentWords.delete(G.recentWords.values().next().value); }

function makeMeteor(isHeal=false){
  const word=pickWord(isHeal),variants=expandVariants(word.r),baseR=32+word.r.length*3.2;
  const sides=Math.floor(rnd(6,10)),verts=[];
  for(let i=0;i<sides;i++){const a=(i/sides)*Math.PI*2,r=baseR*rnd(0.68,1.32);verts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});}
  const cfg=DIFF_CFG[G.diff],spd=cfg.baseSpd+(G.level-1)*cfg.spdStep+rnd(0,0.3);
  return{id:G.nextId++,word,typed:0,variants,activeVariants:[...variants],displayRomaji:variants[0],x:W+baseR+10,y:rnd(72,H-72),verts,baseR,spd,rot:rnd(0,Math.PI*2),rotSpd:rnd(-0.022,0.022),isHeal,color:isHeal?'#1a6a7a':'#7a3a18',glowColor:isHeal?'#00ffee':'#ff6622'};
}

  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,auraR,0,Math.PI*2);ctx.fill();

  ctx.closePath();ctx.fillStyle=m.color;ctx.fill();

  ctx.font='13px monospace';ctx.fillStyle='#ffffff';ctx.fillText(T('nameHint'),W/2,330);
  drawStatsLine(360);
}

function drawOverResults(){
  const rank=getRank(G.score),board=getLeaderboard();
  ctx.textAlign='center';
  const pr=getPraise();
  ctx.font='bold 34px monospace';ctx.shadowBlur=20;ctx.shadowColor=pr.glow;ctx.fillStyle=pr.color;ctx.fillText(pr.text,W/2,52);ctx.shadowBlur=0;
  // スコア＋称号
  ctx.font='bold 20px monospace';ctx.fillStyle='#ffffff';ctx.fillText(`SCORE:  ${G.score}`,W/2-70,95);
  drawRankBadge(rank,W/2+90,95,false);
  if(G.myRankPos>0){ctx.font='bold 13px monospace';ctx.fillStyle='#ffee88';ctx.fillText(T('rankIn',G.myRankPos),W/2,118);}
  const nr2=getNextRank(G.score);
  if(nr2){const nr2Y=G.myRankPos>0?133:118;ctx.font='12px monospace';ctx.fillStyle='#88ccaa';ctx.fillText(T('nextRankMsg',nr2.name,nr2.min-G.score),W/2,nr2Y);}
  // ランキングテーブル
  ctx.font='bold 12px monospace';ctx.fillStyle='#6688aa';ctx.fillText(T('rankingTopLbl'),W/2,150);
  const sy=163,rh=26;
  board.slice(0,7).forEach((e,i)=>{
    const y=sy+i*rh,isMe=(i+1)===G.myRankPos;
    if(isMe){ctx.fillStyle='rgba(80,130,60,0.3)';roundRect(40,y-13,W-80,rh-2,3);ctx.fill();}
    ctx.font=`bold 12px monospace`;
    ctx.textAlign='right';ctx.fillStyle='#667788';ctx.fillText(`${i+1}.`,82,y);
    ctx.textAlign='left';ctx.fillStyle=isMe?'#ffff88':'#cccccc';ctx.fillText((e.name||'名無し').slice(0,10),90,y);
    ctx.textAlign='right';ctx.fillStyle=isMe?'#ffff88':'#ffffff';ctx.fillText(e.score.toLocaleString(),320,y);
    // 称号
    const r=getRank(e.score);ctx.fillStyle=r.color;ctx.fillText(r.name,430,y);
    // 難易度
    const dc=DIFF_CFG[e.diff];ctx.fillStyle=dc?dc.color:'#888';ctx.fillText(e.diff?e.diff[0].toUpperCase():'?',470,y);
    ctx.textAlign='right';ctx.fillStyle='#445566';ctx.fillText(e.date||'',W-45,y);
  });
  if(!board.length){ctx.font='13px monospace';ctx.textAlign='center';ctx.fillStyle='#445566';ctx.fillText(T('noRecord'),W/2,210);}
  // ホームボタン
  const hov=isHoverHomeBtn();
  ctx.fillStyle=hov?'rgba(80,120,220,0.5)':'rgba(40,70,160,0.35)';
  roundRect(HOME_BTN.x,HOME_BTN.y,HOME_BTN.w,HOME_BTN.h,8);ctx.fill();
  ctx.shadowBlur=hov?14:5;ctx.shadowColor='#6688ff';ctx.strokeStyle=hov?'#99aaff':'#5566aa';ctx.lineWidth=hov?2:1;
  roundRect(HOME_BTN.x,HOME_BTN.y,HOME_BTN.w,HOME_BTN.h,8);ctx.stroke();ctx.shadowBlur=0;
  ctx.font=`bold ${hov?17:15}px monospace`;ctx.textAlign='center';ctx.fillStyle=hov?'#ffffff':'#aabbdd';
  ctx.textBaseline='middle';ctx.fillText(T('homeBtn'),W/2,HOME_BTN.y+HOME_BTN.h/2);ctx.textBaseline='alphabetic';
}

// ── ランキング画面 ────────────────────────────────────────────────────────────
const BACK_BTN={x:W/2-80,y:H-65,w:160,h:36};
function isHoverBackBtn(){return mouseX>=BACK_BTN.x&&mouseX<=BACK_BTN.x+BACK_BTN.w&&mouseY>=BACK_BTN.y&&mouseY<=BACK_BTN.y+BACK_BTN.h;}
function drawRankingScreen(){
  ctx.fillStyle='rgba(0,0,20,0.9)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.font='bold 26px monospace';ctx.shadowBlur=16;ctx.shadowColor='#0066ff';ctx.fillStyle='#ffffff';ctx.fillText(T('rankingTitle'),W/2,52);ctx.shadowBlur=0;
  // ヘッダ
  ctx.font='bold 11px monospace';ctx.fillStyle='#556677';ctx.textAlign='left';
  T('cols').forEach(c=>{ctx.textAlign='left';ctx.fillText(c.t,c.x,78);});
  ctx.strokeStyle='#334455';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,85);ctx.lineTo(W-40,85);ctx.stroke();
  const board=getLeaderboard();
  if(!board.length){ctx.font='15px monospace';ctx.textAlign='center';ctx.fillStyle='#445566';ctx.fillText(T('noRecord'),W/2,250);}
  board.slice(0,10).forEach((e,i)=>{
    const y=100+i*37, alt=i%2===1;
    if(alt){ctx.fillStyle='rgba(255,255,255,0.03)';roundRect(40,y-14,W-80,34,3);ctx.fill();}
    const rank=getRank(e.score);
    ctx.font='bold 13px monospace';
    // 順位
    ctx.textAlign='center';ctx.fillStyle=i<3?['#ffdd44','#cccccc','#cc8833'][i]:'#556677';ctx.fillText(`${i+1}`,54,y);
    // 名前
    ctx.textAlign='left';ctx.fillStyle='#dddddd';ctx.fillText((e.name||'名無し').slice(0,10),72,y);
    // スコア
    ctx.fillStyle='#ffffff';ctx.fillText(e.score.toLocaleString(),240,y);
    // 称号バッジ（小）
    drawRankBadge(rank,400,y-1,false);
    // 難易度
    const dc=DIFF_CFG[e.diff];ctx.fillStyle=dc?dc.color:'#888';ctx.textAlign='center';ctx.font='bold 11px monospace';ctx.fillText(e.diff?e.diff.toUpperCase().slice(0,1):'?',470,y);
    // レベル
    ctx.fillStyle='#aaddff';ctx.fillText(e.level||'-',520,y);
    // 撃破数
    ctx.fillStyle='#aaaaaa';ctx.fillText(e.destroyed||0,590,y);
    // 日付
    ctx.textAlign='right';ctx.fillStyle='#445566';ctx.font='12px monospace';ctx.fillText(e.date||'',W-45,y);
  });
  // 戻るボタン
  const hov=isHoverBackBtn();
  ctx.fillStyle=hov?'rgba(50,80,180,0.5)':'rgba(30,50,130,0.35)';roundRect(BACK_BTN.x,BACK_BTN.y,BACK_BTN.w,BACK_BTN.h,6);ctx.fill();
  ctx.shadowBlur=hov?12:4;ctx.shadowColor='#4466ff';ctx.strokeStyle=hov?'#8899ff':'#445588';ctx.lineWidth=hov?2:1;roundRect(BACK_BTN.x,BACK_BTN.y,BACK_BTN.w,BACK_BTN.h,6);ctx.stroke();ctx.shadowBlur=0;
  ctx.font=`bold ${hov?15:13}px monospace`;ctx.textAlign='center';ctx.fillStyle=hov?'#ffffff':'#8899cc';
  ctx.textBaseline='middle';ctx.fillText(T('backBtn'),W/2,BACK_BTN.y+BACK_BTN.h/2);ctx.textBaseline='alphabetic';
}

// ── 称号一覧画面 ───────────────────────────────────────────────────────────────
function drawRanksScreen(){
  ctx.fillStyle='rgba(0,0,20,0.92)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.font='bold 22px monospace';ctx.shadowBlur=14;ctx.shadowColor='#7744ff';
  ctx.fillStyle='#ccaaff';ctx.fillText(T('ranksTitle'),W/2,44);ctx.shadowBlur=0;
  ctx.strokeStyle='#334455';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,54);ctx.lineTo(W-40,54);ctx.stroke();
  const half=Math.ceil(RANKS.length/2); // 9 per column
  RANKS.forEach((r,i)=>{
    const col=i<half?0:1;
    const row=i<half?i:i-half;
    const bx=col===0?22:472;
    const y=70+row*47;
    const next=RANKS[i+1];
    const rangeStr=next?`${r.min.toLocaleString()}〜${(next.min-1).toLocaleString()}`:`${r.min.toLocaleString()}〜`;
    // 背景行
    if(row%2===0){ctx.fillStyle='rgba(255,255,255,0.02)';roundRect(bx,y-14,410,38,3);ctx.fill();}
    drawRankBadge(r,bx+82,y+5,false);
    ctx.font='11px monospace';ctx.textAlign='left';ctx.fillStyle='#5588aa';
    ctx.fillText(rangeStr,bx+172,y+9);
  });
  // 戻るボタン
  const hov=isHoverBackBtn();
  ctx.fillStyle=hov?'rgba(50,80,180,0.5)':'rgba(30,50,130,0.35)';roundRect(BACK_BTN.x,BACK_BTN.y,BACK_BTN.w,BACK_BTN.h,6);ctx.fill();
  ctx.shadowBlur=hov?12:4;ctx.shadowColor='#4466ff';ctx.strokeStyle=hov?'#8899ff':'#445588';ctx.lineWidth=hov?2:1;roundRect(BACK_BTN.x,BACK_BTN.y,BACK_BTN.w,BACK_BTN.h,6);ctx.stroke();ctx.shadowBlur=0;
  ctx.font=`bold ${hov?15:13}px monospace`;ctx.textAlign='center';ctx.fillStyle=hov?'#ffffff':'#8899cc';
  ctx.textBaseline='middle';ctx.fillText(T('backBtn'),W/2,BACK_BTN.y+BACK_BTN.h/2);ctx.textBaseline='alphabetic';
}

// ── 入力処理 ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  initAudio();
  if(G.phase==='title'){
    if(e.key==='Enter'||e.key===' '){G.phase='select';}
    else if(e.key==='r'||e.key==='R'){G.phase='ranking';}
    else if(e.key==='t'||e.key==='T'){G.phase='ranks';}
    return;
  }
  if(G.phase==='ranks'){
    if(e.key==='Escape'||e.key==='Enter'||e.key===' '){initGame();G.phase='title';}
    return;
  }
  if(G.phase==='select'){
    if(e.key==='1')initGame('easy');
    else if(e.key==='2')initGame('normal');
    else if(e.key==='3')initGame('hard');
    return;
  }
  if(G.phase==='ranking'){
    if(e.key==='Escape'||e.key==='Enter'||e.key===' '){initGame();G.phase='title';}
    return;
  }
  if(G.phase==='over'){
    if(!G.nameSaved){
      if(e.key==='Enter'&&G.nameInput.trim()){saveScore();G.nameSaved=true;}
      else if(e.key==='Escape'){G.nameSaved=true;}
      else if(e.key==='Backspace'){e.preventDefault();G.nameInput=G.nameInput.slice(0,-1);}
      else if(e.key.length===1&&G.nameInput.length<12){G.nameInput+=e.key;}
    } else {
      if(e.key==='Enter'||e.key===' '||e.key==='Escape'){initGame();G.phase='title';}
    }
    return;
  }
  if(G.phase!=='play')return;
  if(e.key==='p'||e.key==='P'){G.paused=!G.paused;return;}
  if(G.paused)return;

  if(e.key==='Backspace'){
    e.preventDefault();
    if(G.targetId!==null){
      const m=G.meteors.find(m=>m.id===G.targetId);
      if(m&&m.typed>0){m.typed--;G.input=G.input.slice(0,-1);m.activeVariants=m.variants.filter(v=>v.startsWith(G.input));if(!m.activeVariants.length)m.activeVariants=[...m.variants];m.displayRomaji=m.activeVariants[0];}
      if(G.input==='')G.targetId=null;
    }
    return;
  }
  if(e.key==='Escape'){
    if(G.targetId!==null){const m=G.meteors.find(m=>m.id===G.targetId);if(m){m.typed=0;m.activeVariants=[...m.variants];m.displayRomaji=m.variants[0];}}
    G.targetId=null;G.input='';return;
  }
  if(e.key.length===1&&/[a-zA-Z]/.test(e.key)){
    const ch=e.key.toLowerCase();
    if(G.targetId===null){
      const cands=G.meteors.filter(m=>m.activeVariants.some(v=>v[0]===ch));
      if(!cands.length){G.misses++;G.score=Math.max(0,G.score-5);playMiss();return;}
      cands.sort((a,b)=>a.x-b.x);const m=cands[0];
      G.targetId=m.id;m.activeVariants=m.activeVariants.filter(v=>v[0]===ch);m.typed=1;G.input=ch;m.displayRomaji=m.activeVariants[0];playType();
    } else {
      const m=G.meteors.find(m=>m.id===G.targetId);
      if(!m){G.targetId=null;G.input='';return;}
      const nxt=m.activeVariants.filter(v=>v.length>m.typed&&v[m.typed]===ch);
      if(nxt.length>0){
        m.activeVariants=nxt;m.typed++;G.input+=ch;m.displayRomaji=m.activeVariants[0];playType();
        if(m.typed===m.activeVariants[0].length){
          fireLaser(m.x,m.y,m.isHeal);explode(m.x,m.y,m.isHeal?'#00ffee':'#ff8844',m.isHeal?18:28);
          G.meteors=G.meteors.filter(x=>x.id!==m.id);G.targetId=null;G.input='';G.destroyed++;
          if(G.meteors.length===0)G.spawnCD=Math.min(G.spawnCD,50);
          if(m.isHeal){
            if(G.lives<G.maxLives){G.lives=Math.min(G.maxLives,G.lives+1);}
            else{G.healStock++;}
            G.healFlash=14;G.score+=m.word.r.length*5;playHeal();
          }else{G.score+=m.word.r.length*10*G.level;playDestroy();}
        }
      }else{G.misses++;G.score=Math.max(0,G.score-5);playMiss();}
    }
  }
});

// ── マウス処理 ────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height);
  const hovCard=G.phase==='select'&&DIFF_KEYS.some(k=>isHoverCard(k));
  const hovHome=G.phase==='over'&&G.nameSaved&&isHoverHomeBtn();
  const hovRank=G.phase==='title'&&isHoverRankingBtn();
  const hovBack=(G.phase==='ranking'||G.phase==='ranks')&&isHoverBackBtn();
  const hovPause=G.phase==='play'&&(!G.paused&&isHoverPauseBtn()||G.paused&&(isHoverResumeBtn()||isHoverQuitBtn()));
  const hovLang2=isHoverLangBtn();
  const hovRanks2=isHoverRanksBtn();
  canvas.style.cursor=(hovCard||hovHome||hovRank||hovBack||hovPause||hovLang2||hovRanks2)?'pointer':'default';
});
canvas.addEventListener('click',e=>{
  initAudio();
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(G.phase==='select'){for(const k of DIFF_KEYS){const c=CARDS[k];if(mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h){initGame(k);break;}}}
  else if(G.phase==='title'){
    const c=RANKING_BTN;if(mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h)G.phase='ranking';
    const l=LANG_BTN;if(mx>=l.x&&mx<=l.x+l.w&&my>=l.y&&my<=l.y+l.h)lang=lang==='ja'?'en':'ja';
    const rk=RANKS_BTN;if(mx>=rk.x&&mx<=rk.x+rk.w&&my>=rk.y&&my<=rk.y+rk.h)G.phase='ranks';
  }
  else if(G.phase==='over'&&G.nameSaved){if(mx>=HOME_BTN.x&&mx<=HOME_BTN.x+HOME_BTN.w&&my>=HOME_BTN.y&&my<=HOME_BTN.y+HOME_BTN.h){initGame();G.phase='title';}}
  else if(G.phase==='ranking'){const c=BACK_BTN;if(mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h){initGame();G.phase='title';}}
  else if(G.phase==='ranks'){const c=BACK_BTN;if(mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h){initGame();G.phase='title';}}
  else if(G.phase==='play'){
    if(!G.paused&&mx>=PAUSE_BTN.x&&mx<=PAUSE_BTN.x+PAUSE_BTN.w&&my>=PAUSE_BTN.y&&my<=PAUSE_BTN.y+PAUSE_BTN.h){G.paused=true;}
    else if(G.paused){
      if(mx>=RESUME_BTN.x&&mx<=RESUME_BTN.x+RESUME_BTN.w&&my>=RESUME_BTN.y&&my<=RESUME_BTN.y+RESUME_BTN.h){G.paused=false;}
      else if(mx>=QUIT_BTN.x&&mx<=QUIT_BTN.x+QUIT_BTN.w&&my>=QUIT_BTN.y&&my<=QUIT_BTN.y+QUIT_BTN.h){initGame();G.phase='title';}
    }
  }
});

// ── 更新 ──────────────────────────────────────────────────────────────────────
function update(){
  G.frame++;const cfg=DIFF_CFG[G.diff];G.level=1+Math.floor(G.score/cfg.levelEvery);
  // スポーン: 画面上の隕石数が上限未満の時のみ生成
  G.spawnCD--;
  if(G.spawnCD<=0 && G.meteors.length<maxMeteors()){
    G.meteors.push(makeMeteor(Math.random()<0.18));
    G.spawnCD=Math.max(cfg.spawnMin,cfg.spawnBase-G.level*12);
  }
  for(let i=G.meteors.length-1;i>=0;i--){
    const m=G.meteors[i];m.x-=m.spd;m.rot+=m.rotSpd;
    if(m.x<92){
      if(!m.isHeal){
        explode(m.x,m.y,'#ff3300',14);
        if(G.healStock>0){G.healStock--;G.stockFlash=18;playStock();}
        else{G.lives--;G.damageFlash=16;playDamage();}
        if(G.lives<=0&&!G.goSoundPlayed){G.phase='over';G.goSoundPlayed=true;playGameOver();}
      }
      if(m.id===G.targetId){G.targetId=null;G.input='';}
      G.meteors.splice(i,1);
      if(G.meteors.length===0)G.spawnCD=Math.min(G.spawnCD,50);
    }
  }
  for(let i=G.particles.length-1;i>=0;i--){const p=G.particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life-=p.decay;if(p.life<=0)G.particles.splice(i,1);}
  for(let i=G.lasers.length-1;i>=0;i--){G.lasers[i].life-=0.1;if(G.lasers[i].life<=0)G.lasers.splice(i,1);}
  if(G.damageFlash>0)G.damageFlash--;if(G.healFlash>0)G.healFlash--;if(G.stockFlash>0)G.stockFlash--;
}

// ── 描画 ──────────────────────────────────────────────────────────────────────
function render(){
  drawBg();
  if(G.phase==='play'||G.phase==='over'){
    if(G.damageFlash>0){ctx.fillStyle=`rgba(255,30,0,${G.damageFlash*0.032})`;ctx.fillRect(0,0,W,H);}
    if(G.healFlash>0){ctx.fillStyle=`rgba(0,255,180,${G.healFlash*0.025})`;ctx.fillRect(0,0,W,H);}
    if(G.stockFlash>0){ctx.fillStyle=`rgba(255,200,50,${G.stockFlash*0.025})`;ctx.fillRect(0,0,W,H);}
    for(const l of G.lasers){ctx.save();ctx.globalAlpha=l.life;ctx.shadowBlur=18;ctx.shadowColor=l.color;ctx.strokeStyle=l.color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();ctx.shadowBlur=0;ctx.restore();}
    for(const m of G.meteors)drawMeteor(m);
    for(const p of G.particles){ctx.save();ctx.globalAlpha=p.life;ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.restore();}
    drawRobot(52,H/2);
  }
  if(G.phase==='play')drawHUD();
  if(G.phase==='play'&&G.paused){
    ctx.fillStyle='rgba(0,0,20,0.72)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.font='bold 44px monospace';ctx.shadowBlur=24;ctx.shadowColor='#4466ff';ctx.fillStyle='#aaddff';ctx.fillText(T('pauseTitle'),W/2,H/2-40);ctx.shadowBlur=0;
    // 再開ボタン
    const hr=isHoverResumeBtn();
    ctx.fillStyle=hr?'rgba(40,120,60,0.65)':'rgba(20,70,30,0.45)';roundRect(RESUME_BTN.x,RESUME_BTN.y,RESUME_BTN.w,RESUME_BTN.h,7);ctx.fill();
    ctx.shadowBlur=hr?12:4;ctx.shadowColor='#44ff88';ctx.strokeStyle=hr?'#66ff99':'#336644';ctx.lineWidth=hr?2:1;roundRect(RESUME_BTN.x,RESUME_BTN.y,RESUME_BTN.w,RESUME_BTN.h,7);ctx.stroke();ctx.shadowBlur=0;
    ctx.font=`bold ${hr?16:14}px monospace`;ctx.fillStyle=hr?'#ffffff':'#88ccaa';ctx.fillText(T('resumeBtn'),RESUME_BTN.x+RESUME_BTN.w/2,RESUME_BTN.y+RESUME_BTN.h/2+5);
    // 中止ボタン
    const hq=isHoverQuitBtn();
    ctx.fillStyle=hq?'rgba(120,30,30,0.65)':'rgba(70,20,20,0.45)';roundRect(QUIT_BTN.x,QUIT_BTN.y,QUIT_BTN.w,QUIT_BTN.h,7);ctx.fill();
    ctx.shadowBlur=hq?12:4;ctx.shadowColor='#ff4444';ctx.strokeStyle=hq?'#ff6666':'#663333';ctx.lineWidth=hq?2:1;roundRect(QUIT_BTN.x,QUIT_BTN.y,QUIT_BTN.w,QUIT_BTN.h,7);ctx.stroke();ctx.shadowBlur=0;
    ctx.font=`bold ${hq?16:14}px monospace`;ctx.fillStyle=hq?'#ffffff':'#cc8888';ctx.fillText(T('quitBtn'),QUIT_BTN.x+QUIT_BTN.w/2,QUIT_BTN.y+QUIT_BTN.h/2+5);
  }
  if(G.phase==='title')drawTitleScreen();
  if(G.phase==='select')drawSelectScreen();
  if(G.phase==='over'){ctx.fillStyle='rgba(0,0,20,0.9)';ctx.fillRect(0,0,W,H);if(!G.nameSaved)drawOverNameInput();else drawOverResults();}
  if(G.phase==='ranking')drawRankingScreen();
  if(G.phase==='ranks')drawRanksScreen();
}

// ── メインループ ──────────────────────────────────────────────────────────────
function loop(){if(G.phase==='play'&&!G.paused)update();else G.frame++;render();requestAnimationFrame(loop);}
loop();
